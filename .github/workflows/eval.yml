name: RAG Evaluation Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "eval/**"
      - "requirements.txt"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "eval/**"
      - "requirements.txt"

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # NEW — download PDF during CI (no PDF in repo needed)
      - name: Download sample PDF
        run: |
          mkdir -p data/samples
          curl -L "https://arxiv.org/pdf/1706.03762" -o data/samples/attention.pdf
          echo "PDF downloaded successfully"

      - name: Ingest sample PDF
        env:
          HUGGINGFACEHUB_API_TOKEN: ${{ secrets.HUGGINGFACEHUB_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HUGGINGFACEHUB_API_TOKEN }}
        run: python src/ingest.py

      - name: Run evaluation pipeline
        env:
          HUGGINGFACEHUB_API_TOKEN: ${{ secrets.HUGGINGFACEHUB_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HUGGINGFACEHUB_API_TOKEN }}
        run: python eval/evaluate.py